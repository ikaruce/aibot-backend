# .github/workflows/ai-cli-dispatch.yml
#
# Auto-installed by {{APP_NAME}} GitHub App.
# This file is managed by the app — manual edits may be overwritten.
#
# What this workflow does:
#   - On PR open/update → runs the configured AI skill as a code review
#   - On comment containing @ai-cli → executes the user's free-form instruction
#
# Configuration (set in your repository settings):
#   Secrets:
#     AI_CLI_API_KEY   — API key for the AI tool (e.g., Gemini API key)
#     AI_CLI_APP_TOKEN — Static API key for the {{APP_NAME}} backend.
#                        Forwarded to the reusable workflow as AIBOT_API_KEY,
#                        which it uses to fetch a fresh GitHub App installation
#                        token from {{APP_NAME}} on demand.
#   Variables (optional):
#     AI_CLI_APP_NAME  — Display name in comments (default: '{{APP_NAME}}')
#     AI_CLI_SKILL     — Predefined skill to use for PR review
#                        (default: 'code-review-commons')
#     AI_CLI_RULES     — Comma-separated rule names for PR review
#                        (default: 'code-inspection-common')

name: AI CLI Dispatch

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# GITHUB_TOKEN permissions — used as a fallback by the reusable workflow when
# the {{APP_NAME}} backend cannot mint a fresh installation token. With these
# scopes the workflow can still post review/issue comments, just under the
# github-actions[bot] identity instead of the App.
permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  # ── Determine routing from event context ───────────────────────────────────
  route:
    runs-on: ubuntu-latest
    outputs:
      route_type: ${{ steps.router.outputs.route_type }}
      command:    ${{ steps.router.outputs.command }}
      pr_number:  ${{ steps.router.outputs.pr_number }}
      is_pr:      ${{ steps.router.outputs.is_pr }}
    steps:
      - name: Detect event type and extract routing info
        id: router
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload   = context.payload;

            // Helper: write to GITHUB_OUTPUT
            const out = (k, v) => core.setOutput(k, v);

            if (eventName === 'pull_request') {
              out('route_type', 'pr_event');
              out('pr_number',  String(payload.pull_request.number));
              return;
            }

            const commentBody = payload.comment?.body ?? '';
            // Match @ai-cli (case-insensitive), then any combination of
            // whitespace / comma / colon, then the rest as the command (which
            // may be empty — a bare @ai-cli still routes as a mention).
            const mentionMatch = commentBody.match(/@ai-cli\b[\s,:]*([\s\S]*)/i);
            const command = mentionMatch ? mentionMatch[1].trim() : '';
            const isPrComment = !!payload.issue?.pull_request;
            const prNumber =
              payload.pull_request?.number ?? payload.issue?.number;
            core.info(
              `event=${eventName} mention=${!!mentionMatch} ` +
              `isPrComment=${isPrComment} prNumber=${prNumber} command="${command}"`
            );

            if (eventName === 'issue_comment') {
              // Both PR and plain-issue comments are accepted. GitHub uses one
              // numbering space for issues + PRs, so payload.issue.number is
              // valid either way; downstream uses is_pr to branch.
              if (mentionMatch) {
                out('route_type', 'mention');
                out('command',    command);
                out('pr_number',  String(payload.issue.number));
                out('is_pr',      String(isPrComment));
              } else {
                out('route_type', 'none');
              }
              return;
            }

            if (eventName === 'pull_request_review_comment') {
              if (mentionMatch) {
                out('route_type', 'mention');
                out('command',    command);
                out('pr_number',  String(payload.pull_request.number));
                out('is_pr',      'true');
              } else {
                out('route_type', 'none');
              }
              return;
            }

            core.info(`skip: unhandled event ${eventName}`);
            out('route_type', 'none');

  # ── PR auto-review via skill ───────────────────────────────────────────────
  pr-review:
    needs: route
    if: needs.route.outputs.route_type == 'pr_event'
    uses: {{AICLI_REPO}}/.github/workflows/ai-skill-runner.yml@main
    with:
      skill_name: ${{ vars.AI_CLI_SKILL || 'code-review-commons' }}
      rules:      ${{ vars.AI_CLI_RULES || 'code-inspection-common' }}
      pr_number:  ${{ fromJSON(needs.route.outputs.pr_number) }}
      app_name:   ${{ vars.AI_CLI_APP_NAME || '{{APP_NAME}}' }}
      aicli_repo: '{{AICLI_REPO}}'
      aicli_ref:  main
      aibot_url:  '{{AIBOT_URL}}'
    secrets:
      AI_API_KEY:    ${{ secrets.AI_CLI_API_KEY }}
      AIBOT_API_KEY: ${{ secrets.AI_CLI_APP_TOKEN }}

  # ── @ai-cli mention handler ────────────────────────────────────────────────
  ai-command:
    needs: route
    if: needs.route.outputs.route_type == 'mention'
    uses: {{AICLI_REPO}}/.github/workflows/ai-command.yml@main
    with:
      command:    ${{ needs.route.outputs.command }}
      pr_number:  ${{ fromJSON(needs.route.outputs.pr_number || '0') }}
      is_pr:      ${{ needs.route.outputs.is_pr == 'true' }}
      app_name:   ${{ vars.AI_CLI_APP_NAME || '{{APP_NAME}}' }}
      aicli_repo: '{{AICLI_REPO}}'
      aicli_ref:  main
      aibot_url:  '{{AIBOT_URL}}'
    secrets:
      AI_API_KEY:    ${{ secrets.AI_CLI_API_KEY }}
      AIBOT_API_KEY: ${{ secrets.AI_CLI_APP_TOKEN }}
